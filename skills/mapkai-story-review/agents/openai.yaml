interface:
  display_name: "MapKAI Story Review"
  short_description: "Strictly review MapKAI stories for false scenes and weak turns."
  default_prompt: "Use $mapkai-story-review to review this MapKAI knowledge story with a hard verdict: PASS, PASS / LOCAL EDIT, LOCAL EDIT, or FAIL. Use the router first when mode is unclear; for concept fables, check serious allegory, narrative depth before reveal, repeated tension, late concept reveal, metaphor mapping, analogy boundary, and whether a short example has been mistaken for a fable."
