interface:
  display_name: "MapKAI Story Review"
  short_description: "Strictly review MapKAI stories for false scenes and weak turns."
  default_prompt: "Review this MapKAI knowledge story with a hard verdict: PASS, PASS / LOCAL EDIT, LOCAL EDIT, or FAIL. Use Quick Review Mode by default, but use Full Audit Mode for FAIL, samples/benchmarks, detailed requests, historical-scene risk, template-shell risk, or when micro-edits are needed. Check historical time/place/action consistency first, then decide whether the body is a real field-origin story or only a discovery/contribution story. The story must show why the selected discipline began to need its own object, question, or method. Identify the true origin turn from the person/event itself; fail it if the field title is only a label, if the body would work under another field name, or if it forces the universal template 'naming/classification/single record -> measurement/comparison -> table/chart' onto the wrong topic. Check audience/register fit, title promise vs body, fake scene risk, template-language leakage, evidence pressure, narrative movement, compressed expression, narrative thickness, field/method fit, knowledge-turn sharpness, useful literary language, cautious causality, factual safety, and non-AI style. Fail stories whose title objects are decorative, whose old question defaults to naming/classification when that does not match the person/event, or whose hidden knowledge supplies a turn the body did not stage."
