interface:
  display_name: "MapKAI Story Review"
  short_description: "Strictly review MapKAI stories for false scenes and weak turns."
  default_prompt: "Review this MapKAI knowledge story with a hard verdict: PASS, PASS / LOCAL EDIT, LOCAL EDIT, or FAIL. Check historical time/place/action consistency first, then decide whether the body is a real story or a generic template shell. Check audience/register fit: readable for curious general adults and advanced students, not childish, not fairy-tale-like, not academic-paper prose. Check title promise vs body, fake scene risk, template-language leakage, evidence pressure, narrative thickness, field/method fit, knowledge-turn sharpness, useful literary language, cautious causality, factual safety, and non-AI style. Fail stories whose old question defaults to naming/classification when that does not match the person/event, or whose hidden knowledge supplies a turn the body did not stage. If the body contains internal scaffolding such as '旧办法并不荒唐' or generic old/new-question prose, or if the main scene must be rebuilt, mark FAIL rather than micro-editing."
