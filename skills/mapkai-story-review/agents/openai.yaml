interface:
  display_name: "MapKAI Story Review"
  short_description: "Strictly review MapKAI stories for false scenes and weak turns."
  default_prompt: "Review this MapKAI knowledge story with a hard verdict: PASS, PASS / LOCAL EDIT, LOCAL EDIT, or FAIL. Use the MapKAI knowledge router first when the mode is unclear: historical/field-origin, concept fable, mechanism explainer, lens story, case pattern, or misconception correction. Use Quick Review Mode by default, but use Full Audit Mode for FAIL, samples/benchmarks, detailed requests, historical-scene risk, template-shell risk, or when micro-edits are needed. Check whether the selected mode fits the knowledge type and whether the output satisfies that mode's minimum structure. For historical/field-origin stories, require concrete time/place/action, evidence pressure, and why the field began to need its own object, question, or method. For concept fables, require serious allegory, late concept reveal, mapping, and analogy boundary. For mechanism explainers, require step-by-step mechanism and a checkable example. Across all modes, check audience/register fit, title promise, template leakage, narrative movement, compressed expression, field/method fit, cautious causality, factual safety, and non-AI style."
