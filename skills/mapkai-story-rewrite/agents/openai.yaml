interface:
  display_name: "MapKAI Story Rewrite"
  short_description: "Generate reliable MapKAI discovery stories, not false scenes."
  default_prompt: "Rewrite this MapKAI knowledge story as a historically situated, scene-consistent discovery story for curious general adults and advanced students: readable without becoming childish, method-sharp without becoming academic prose. First identify the story's one true core turn from the person/event itself, such as scale change, attribution, long-term trend, spatial distribution, ecological relation/action, tool redesign, institutional decision, or artistic perception. Do not default to the universal template 'naming/classification/single record -> measurement/comparison -> table/chart.' If the original is a generic template shell, fake scene, abstract explanation, or mismatched old/new-question formula, rebuild the main historical scene instead of polishing sentences. Choose one time/place/action axis, identify the title's concrete promise, make the old method feel initially reasonable, and define the old question from the actual person/event. Add topic-specific evidence pressure, include at least two concrete actions, show a sharp old-to-new question turn, and make visible field methods through actual objects, samples, records, tools, people, places, or actions. Do not invent high-risk historical details, and do not let hidden knowledge rescue a body that did not stage the turn."
