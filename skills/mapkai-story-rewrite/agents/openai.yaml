interface:
  display_name: "MapKAI Story Rewrite"
  short_description: "Generate reliable MapKAI discovery stories, not false scenes."
  default_prompt: "Rewrite this MapKAI knowledge story as a historically situated, scene-consistent discovery story. First choose one main time/place/action axis, make the old method feel initially reasonable, add evidence pressure, include at least two concrete actions, show a sharp old-to-new question turn, and make visible field methods such as measuring, comparing, modeling, or visualizing where relevant."
