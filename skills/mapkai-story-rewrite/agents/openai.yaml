interface:
  display_name: "MapKAI Story Rewrite"
  short_description: "Generate reliable MapKAI discovery stories, not false scenes."
  default_prompt: "Use the MapKAI knowledge router first if the input may not be historical or field-origin content. For historical or field-origin content, rewrite this MapKAI knowledge story as a historically situated, scene-consistent field-origin story for curious general adults and advanced students: readable without becoming childish, method-sharp without becoming academic prose. Use the person/event as an entrance, but make the real subject why the selected discipline began to need its own object, question, and method. First identify the field-origin turn: before this field, X was treated as part of Y; through Z, it became a problem/object needing question W. Do not default to the universal template 'naming/classification/single record -> measurement/comparison -> table/chart.' If the original is a generic template shell, fake scene, abstract explanation, or mismatched old/new-question formula, rebuild the main historical scene instead of polishing sentences. Choose one time/place/action axis, identify the title's concrete promise, make the old method feel initially reasonable, and define the old question from the actual person/event and field origin. Add topic-specific evidence pressure and narrative movement. Avoid fake drama and high-risk invented detail. Clarity first, story movement second, poetic quality last."
