interface:
  display_name: "MapKAI Story Rewrite"
  short_description: "Generate reliable MapKAI discovery stories, not false scenes."
  default_prompt: "Rewrite this MapKAI knowledge story as a historically situated, scene-consistent discovery story. First judge whether the original is a generic template shell, fake scene, abstract explanation, or mismatched old/new-question formula; if so, rebuild the main historical scene instead of polishing sentences. Choose one time/place/action axis, identify the title's concrete promise, make the old method feel initially reasonable, add topic-specific evidence pressure, include at least two concrete actions, show a sharp old-to-new question turn, and make visible field methods through actual objects, samples, records, tools, or marks. Do not print internal scaffolding such as '旧办法并不荒唐' or generic old/new-question templates."
